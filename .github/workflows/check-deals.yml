name: Checar promoções

on:
  # Baileys precisa de sessão e disco persistentes, que o GitHub Actions não oferece.
  # Execução automática fica exclusivamente no worker local/VPS.
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - run: npm run check
        env:
          # GitHub Actions não preserva a sessão local do Baileys; produção agendada usa Meta.
          WHATSAPP_PROVIDER: meta
          WHATSAPP_ACCESS_TOKEN: ${{ secrets.WHATSAPP_ACCESS_TOKEN }}
          WHATSAPP_PHONE_NUMBER_ID: ${{ secrets.WHATSAPP_PHONE_NUMBER_ID }}
          WHATSAPP_RECIPIENTS: ${{ secrets.WHATSAPP_RECIPIENTS }}
          WHATSAPP_TEMPLATE_NAME: ${{ vars.WHATSAPP_TEMPLATE_NAME }}
          WHATSAPP_TEMPLATE_LANGUAGE: ${{ vars.WHATSAPP_TEMPLATE_LANGUAGE }}
          WHATSAPP_API_VERSION: ${{ vars.WHATSAPP_API_VERSION }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          AMAZON_AFFILIATE_TAG: ${{ secrets.AMAZON_AFFILIATE_TAG }}
          LOMADEE_API_KEY: ${{ secrets.LOMADEE_API_KEY }}
          AWIN_PUBLISHER_ID: ${{ secrets.AWIN_PUBLISHER_ID }}
          DEAL_DISCOUNT_THRESHOLD: ${{ vars.DEAL_DISCOUNT_THRESHOLD }}
          ACTIVE_SOURCES: ${{ vars.ACTIVE_SOURCES }}
          CATEGORY_KEYWORDS: ${{ vars.CATEGORY_KEYWORDS }}
          LOMADEE_ORGANIZATION_IDS: ${{ vars.LOMADEE_ORGANIZATION_IDS }}
          DEDUP_TTL_HOURS: ${{ vars.DEDUP_TTL_HOURS }}
          MAX_POSTS_PER_RUN: ${{ vars.MAX_POSTS_PER_RUN }}
